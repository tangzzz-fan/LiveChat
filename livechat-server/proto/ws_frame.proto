syntax = "proto3";

package livechat.ws;

option go_package = "github.com/tangzzz-fan/LiveChat/livechat-server/internal/proto";

// WsFrame is the outer envelope for all WebSocket messages.
message WsFrame {
    uint32 version    = 1;  // protocol version (currently 0x01)
    uint32 opcode     = 2;  // operation code
    uint64 seq_id     = 3;  // frame sequence number (client increments)
    uint64 ack_seq_id = 4;  // piggyback ACK: last received seq_id
    bytes  payload    = 5;  // opcode-specific protobuf payload
    int64  timestamp_ms = 6;
    string trace_id     = 7;
}

// ── System opcodes (0x0001 - 0x0008) ─────────────────

message HandshakeRequest {
    string access_token  = 1;
    string device_id     = 2;
    string platform      = 3;
    string app_version   = 4;
    uint32 protocol_ver  = 5;
    uint64 last_event_seq = 6;
}

message HandshakeResponse {
    bool   success        = 1;
    string session_id     = 2;
    uint32 negotiated_ver = 3;
    uint64 server_time_ms = 4;
    string error_message  = 5;
    uint32 heartbeat_interval_s = 6;
    uint64 latest_event_seq = 7;
}

message Heartbeat {}

message HeartbeatAck {
    uint64 server_time_ms = 1;
}

message MessageAck {
    uint64 event_seq    = 1;
    string ack_type     = 2;
    uint64 acked_at_ms  = 3;
    string conversation_id = 4;
    uint64 last_read_seq = 5;
}

message ErrorFrame {
    uint32 error_code  = 1;
    string message     = 2;
    bool   should_reconnect = 3;
}

// ── Message delivery (0x1000 - 0x1FFF) ─────────────

message WsMessageDelivery {
    string server_message_id = 1;
    string conversation_id   = 2;
    uint64 conversation_seq  = 3;
    uint64 sender_user_id    = 4;
    string sender_device_id  = 5;
    string message_type      = 6;
    string content           = 7; // JSON-encoded
    int64  server_received_at_ms = 8;
}

// ── State sync (0x2000 - 0x2FFF) ────────────────────

message SyncEventMessage {
    uint64 event_seq       = 1;
    string event_type      = 2;
    uint64 user_id         = 3;
    string conversation_id = 4;
    string payload         = 5; // JSON-encoded
    int64  created_at_ms   = 6;
}

message ConversationUpdate {
    string conversation_id       = 1;
    string last_message_preview  = 2;
    int64  last_message_at_ms    = 3;
    int32  unread_count          = 4;
}
