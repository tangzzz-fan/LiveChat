syntax = "proto3";

package livechat.internal;

option go_package = "github.com/tangzzz-fan/LiveChat/livechat-server/proto;proto";

import "ws_frame.proto";

message DeliverMessageRequest {
    int64 user_id = 1;
    string device_id = 2;
    livechat.ws.WsMessageDelivery message = 3;
    string trace_id = 4;
}

message DeliverMessageResponse {}

service GatewayDeliveryService {
    rpc DeliverMessage(DeliverMessageRequest) returns (DeliverMessageResponse);
}

message ProcessAckRequest {
    int64 user_id = 1;
    string device_id = 2;
    string ack_type = 3;
    uint64 event_seq = 4;
    string conversation_id = 5;
    uint64 last_read_seq = 6;
    uint64 acked_at_ms = 7;
    string trace_id = 8;
}

message ProcessAckResponse {
    bool accepted = 1;
}

service MessageAckService {
    rpc ProcessAck(ProcessAckRequest) returns (ProcessAckResponse);
}
